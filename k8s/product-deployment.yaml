apiVersion: apps/v1
kind: Deployment
metadata:
    name: product-service
spec:
    replicas: 2
    selector:
        matchLabels:
            app: product-service
    template:
        metadata:
            labels:
                app: product-service
        spec:
            containers:
                - name: product
                  image: your-registry/product-service:latest # CHANGE THIS
                  ports:
                      - containerPort: 3001
                  env:
                      - name: MONGO_URI
                        valueFrom:
                            secretKeyRef:
                                name: mongodb-secret
                                key: uri
                      - name: PORT
                        value: '3001'
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 3001
                      initialDelaySeconds: 10
                      periodSeconds: 5
