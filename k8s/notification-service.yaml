apiVersion: apps/v1
kind: Deployment
metadata:
    name: notification-service
    labels:
        app: notification-service
spec:
    replicas: 1
    selector:
        matchLabels:
            app: notification-service
    template:
        metadata:
            labels:
                app: notification-service
        spec:
            containers:
                - name: notification
                  image: your-registry/notification-service:latest
                  ports:
                      - containerPort: 3004
                  env:
                      - name: PORT
                        value: '3004'
                      - name: LINKEDIN_ACCESS_TOKEN
                        valueFrom:
                            secretKeyRef:
                                name: linkedin-secret
                                key: access_token
                      - name: LINKEDIN_PERSON_ID
                        valueFrom:
                            secretKeyRef:
                                name: linkedin-secret
                                key: person_id
                      - name: SMTP_HOST
                        valueFrom:
                            secretKeyRef:
                                name: smtp-secret
                                key: host
                      - name: SMTP_PORT
                        valueFrom:
                            secretKeyRef:
                                name: smtp-secret
                                key: port
                      - name: SMTP_USER
                        valueFrom:
                            secretKeyRef:
                                name: smtp-secret
                                key: user
                      - name: SMTP_PASS
                        valueFrom:
                            secretKeyRef:
                                name: smtp-secret
                                key: pass
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 3004
                      initialDelaySeconds: 10
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 3004
                      initialDelaySeconds: 5
                      periodSeconds: 5
                  resources:
                      requests:
                          memory: '128Mi'
                          cpu: '100m'
                      limits:
                          memory: '256Mi'
                          cpu: '250m'
---
apiVersion: v1
kind: Service
metadata:
    name: notification-service
    labels:
        app: notification-service
spec:
    type: ClusterIP
    ports:
        - port: 3004
          targetPort: 3004
          protocol: TCP
          name: http
    selector:
        app: notification-service
