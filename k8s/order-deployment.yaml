apiVersion: apps/v1
kind: Deployment
metadata:
    name: order-service
spec:
    replicas: 2
    selector:
        matchLabels:
            app: order-service
    template:
        metadata:
            labels:
                app: order-service
        spec:
            containers:
                - name: order
                  image: your-registry/order-service:latest # CHANGE THIS
                  ports:
                      - containerPort: 3002
                  env:
                      - name: MONGO_URI
                        valueFrom:
                            secretKeyRef:
                                name: mongodb-secret
                                key: uri
                      - name: PRODUCT_SERVICE_URL
                        valueFrom:
                            configMapKeyRef:
                                name: app-config
                                key: product_service_url
                      - name: PORT
                        value: '3002'
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 3002
                      initialDelaySeconds: 10
                      periodSeconds: 5
