name: CI/CD
on: push
jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2
            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Build and push images
              run: |
                  for svc in api-gateway auth-service product-service order-service event-consumer; do
                    docker build -t ${{ secrets.DOCKER_USERNAME }}/$svc:latest ./$svc
                    docker push ${{ secrets.DOCKER_USERNAME }}/$svc:latest
                  done
            - name: Deploy to Kubernetes (via Helm)
              run: |
                  helm upgrade --install retail ./helm/retail-chart \
                    --set image.repository=${{ secrets.DOCKER_USERNAME }} \
                    --set image.tag=latest \
                    --set mongodb.uri=${{ secrets.MONGO_ATLAS_URI }} \
                    --set jwt.secret=${{ secrets.JWT_SECRET }}
